<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #238636;
            --accent-hover: #2ea043;
            --error: #f85149;
            --border: #30363d;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        p.subheading {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
        }

        button.generate-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button.generate-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button.generate-btn:active {
            transform: translateY(0);
        }

        /* Result Area */
        #result-area {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-preview {
            width: 100%;
            border-radius: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: #fff;
            /* The generated card has its own background */
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            display: block;
        }

        .actions {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .secondary-btn {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .secondary-btn:hover {
            background: #30363d;
        }

        /* Loading Skeleton */
        #loading-state {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .skeleton {
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        @keyframes pulse {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }

        .skeleton-text {
            height: 20px;
            width: 60%;
        }

        .skeleton-text-sm {
            height: 14px;
            width: 40%;
        }

        .skeleton-block {
            height: 150px;
            width: 100%;
        }

        /* Error Message */
        #error-msg {
            display: none;
            margin-top: 1rem;
            color: var(--error);
            font-size: 0.9rem;
            padding: 10px;
            background: rgba(248, 81, 73, 0.1);
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subheading">Enter any public GitHub username to generate your personal card</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds" spellcheck="false">
            <button class="generate-btn" onclick="generateCard()">
                <span id="btn-text">Generate Card</span>
            </button>
        </div>

        <div id="error-msg"></div>

        <!-- Loading Skeleton -->
        <div id="loading-state">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <div class="skeleton skeleton-circle"></div>
                <div style="flex: 1;">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text-sm"></div>
                </div>
            </div>
            <div class="skeleton skeleton-block"></div>
        </div>

        <!-- Result Area -->
        <div id="result-area">
            <div class="card-preview" id="card-wrap">
                <!-- iframe will be injected here -->
            </div>
            <div class="actions">
                <button class="secondary-btn" onclick="copyUrl()">Share Card URL</button>
                <a id="download-link" href="#" target="_blank" style="text-decoration: none;">
                    <button class="secondary-btn">Open in New Tab</button>
                </a>
            </div>
        </div>
    </div>

    <script>
        let currentCardUrl = "";
        const BACKEND_URL = "";

        async function generateCard() {
            const username = document.getElementById('username').value.trim();
            const btn = document.querySelector('.generate-btn');
            const btnText = document.getElementById('btn-text');
            const loading = document.getElementById('loading-state');
            const result = document.getElementById('result-area');
            const error = document.getElementById('error-msg');

            if (!username) {
                error.innerText = "Please enter a GitHub username.";
                error.style.display = "block";
                return;
            }

            // Reset UI
            error.style.display = 'none';
            result.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;
            btnText.innerText = "Processing...";

            try {
                const response = await fetch(`${BACKEND_URL}/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (data.card_url) {
                    currentCardUrl = `${BACKEND_URL}${data.card_url}`;

                    // Inject iframe
                    const cardWrap = document.getElementById('card-wrap');
                    cardWrap.innerHTML = `
                    <iframe src="${currentCardUrl}"></iframe>
                `;

                    document.getElementById('download-link').href = currentCardUrl;

                    loading.style.display = 'none';
                    result.style.display = 'block';
                } else {
                    throw new Error(data.detail || "Generation failed");
                }

            } catch (e) {
                console.error(e);
                loading.style.display = 'none';
                error.innerText = e.message;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.innerText = "Generate Card";
            }
        }

        function copyUrl() {
            if (!currentCardUrl) return;

            navigator.clipboard.writeText(currentCardUrl)
                .then(() => {
                    alert("Card URL copied!");
                });
        }
    </script>
</body>

</html>
